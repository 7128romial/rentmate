{% extends "base.html" %}
{% block title %}איפוס סיסמה{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="login-card">
    <div class="text-center" style="margin-bottom:24px;">
      <h2>איפוס סיסמה</h2>
      <p class="text-muted">בחר סיסמה חדשה להמשך</p>
    </div>
    {% if error %}<div class="auth-errors"><p>{{ error }}</p></div>{% endif %}
    <form method="POST" action="{{ url_for('auth.password_reset_form', token=token) }}">
      <div class="form-group">
        <label>סיסמה חדשה</label>
        <input type="password" name="password" class="form-control" required minlength="8">
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg">עדכן סיסמה</button>
    </form>
  </div>
</div>
{% endblock %}
