<!DOCTYPE html>
<html lang="he" dir="rtl">
<body style="font-family: Arial, sans-serif; background:#f7f7f7; padding:24px;">
  <div style="max-width:480px; margin:auto; background:#fff; padding:32px; border-radius:16px;">
    <h2 style="color:#FF4458;">הודעה חדשה מ-{{ sender.first_name }}</h2>
    <blockquote style="border-right:3px solid #FF4458; padding:12px 16px; background:#fafafa; border-radius:8px;">
      {{ preview }}
    </blockquote>
    <p style="margin-top:24px;">
      <a href="{{ config['APP_BASE_URL'] }}/chat?conv={{ conversation_id }}"
         style="background:#FF4458; color:#fff; padding:12px 24px; border-radius:8px; text-decoration:none; font-weight:600;">
        קרא הודעה
      </a>
    </p>
  </div>
</body>
</html>
