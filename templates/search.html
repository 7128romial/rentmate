{% extends "base.html" %}
{% block title %}חיפוש דירות{% endblock %}

{% block content %}
<div class="search-layout">
  <!-- Filter sidebar -->
  <aside class="filter-sidebar" id="filter-sidebar">
    <h3>🔧 סינון תוצאות</h3>

    <div class="form-group">
      <label>סוג נכס</label>
      <div class="chip-group" id="type-chips">
        <span class="chip active" data-val="all">הכל</span>
        <span class="chip" data-val="apartment">דירה</span>
        <span class="chip" data-val="room">חדר</span>
        <span class="chip" data-val="studio">סטודיו</span>
        <span class="chip" data-val="house">בית</span>
      </div>
    </div>

    <div class="form-group">
      <label>עיר</label>
      <select class="form-control" id="filter-city">
        <option value="">כל הערים</option>
        {% for c in cities %}
        <option value="{{ c }}">{{ c }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="form-group">
      <label>מחיר חודשי (₪)</label>
      <div class="form-row">
        <input type="number" class="form-control" id="filter-min-price" placeholder="מינימום">
        <input type="number" class="form-control" id="filter-max-price" placeholder="מקסימום">
      </div>
    </div>

    <div class="form-group">
      <label>חדרים</label>
      <div class="chip-group" id="room-chips">
        <span class="chip active" data-val="all">הכל</span>
        <span class="chip" data-val="1">1</span>
        <span class="chip" data-val="2">2</span>
        <span class="chip" data-val="3">3</span>
        <span class="chip" data-val="4">4+</span>
      </div>
    </div>

    <div class="form-group">
      <label>תכונות</label>
      <div class="toggle-switch">
        <label for="f-furnished">מרוהטת</label>
        <input type="checkbox" id="f-furnished">
      </div>
      <div class="toggle-switch">
        <label for="f-parking">חנייה</label>
        <input type="checkbox" id="f-parking">
      </div>
      <div class="toggle-switch">
        <label for="f-elevator">מעלית</label>
        <input type="checkbox" id="f-elevator">
      </div>
      <div class="toggle-switch">
        <label for="f-pets">חיות מחמד</label>
        <input type="checkbox" id="f-pets">
      </div>
    </div>

    <button class="btn btn-primary btn-block" onclick="searchProperties()">הצג תוצאות</button>
    <button class="btn btn-ghost btn-block mt-1" onclick="resetFilters()">אפס סינון</button>
  </aside>

  <!-- Results -->
  <div class="search-results">
    <div class="search-header">
      <h3 id="results-count">טוען...</h3>
      <select class="form-control" id="sort-select" style="width:auto;" onchange="searchProperties()">
        <option value="newest">חדשות</option>
        <option value="price_asc">מחיר - נמוך לגבוה</option>
        <option value="price_desc">מחיר - גבוה לנמוך</option>
        <option value="score">ציון התאמה</option>
      </select>
    </div>

    <div class="property-grid" id="property-grid">
      <!-- Skeleton loading -->
      <div class="card skeleton" style="height:320px"></div>
      <div class="card skeleton" style="height:320px"></div>
      <div class="card skeleton" style="height:320px"></div>
    </div>

    <div class="pagination" id="pagination"></div>
  </div>
</div>

<!-- Mobile filter button -->
<button class="btn btn-primary mobile-filter-btn" onclick="document.getElementById('filter-sidebar').classList.toggle('open')">
  🔧 סינון
</button>
{% endblock %}

{% block scripts %}
<script>
let currentPage = 1;

// Chip selectors
document.querySelectorAll('.chip-group').forEach(group => {
  group.addEventListener('click', e => {
    if (!e.target.classList.contains('chip')) return;
    group.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    e.target.classList.add('active');
  });
});

function getFilters() {
  const typeChip = document.querySelector('#type-chips .chip.active');
  const roomChip = document.querySelector('#room-chips .chip.active');
  return {
    type: typeChip ? typeChip.dataset.val : 'all',
    city: document.getElementById('filter-city').value,
    min_price: document.getElementById('filter-min-price').value,
    max_price: document.getElementById('filter-max-price').value,
    rooms: roomChip ? roomChip.dataset.val : 'all',
    furnished: document.getElementById('f-furnished').checked,
    parking: document.getElementById('f-parking').checked,
    elevator: document.getElementById('f-elevator').checked,
    pets: document.getElementById('f-pets').checked,
    sort: document.getElementById('sort-select').value,
    page: currentPage,
  };
}

async function searchProperties() {
  const f = getFilters();
  const params = new URLSearchParams();
  if (f.type !== 'all') params.set('type', f.type);
  if (f.city) params.set('city', f.city);
  if (f.min_price) params.set('min_price', f.min_price);
  if (f.max_price) params.set('max_price', f.max_price);
  if (f.rooms !== 'all') params.set('rooms', f.rooms);
  if (f.furnished) params.set('furnished', 'true');
  if (f.parking) params.set('parking', 'true');
  if (f.elevator) params.set('elevator', 'true');
  if (f.pets) params.set('pets', 'true');
  params.set('sort', f.sort);
  params.set('page', f.page);

  try {
    const res = await fetch('/api/properties?' + params.toString());
    const data = await res.json();
    renderResults(data);
  } catch (e) {
    console.error(e);
  }
}

function renderResults(data) {
  const grid = document.getElementById('property-grid');
  const counter = document.getElementById('results-count');

  counter.textContent = `מציג ${data.total} דירות`;

  if (data.items.length === 0) {
    grid.innerHTML = `
      <div class="empty-state" style="grid-column:1/-1;">
        <div class="empty-state-icon">🔍</div>
        <h3>לא נמצאו דירות</h3>
        <p>נסה לשנות את הסינון שלך</p>
      </div>`;
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  grid.innerHTML = data.items.map(p => {
    const scoreClass = (p.match_score || 0) >= 80 ? 'high' : (p.match_score || 0) >= 60 ? 'medium' : 'low';
    const features = [];
    if (p.furnished) features.push('מרוהטת');
    if (p.parking) features.push('חנייה');
    if (p.pets_allowed) features.push('חיות');
    return `
      <div class="property-card" onclick="window.location='/properties/${p.id}'">
        <div class="property-card-img">
          🏠
          ${p.match_score ? `<span class="score-badge ${scoreClass}">${p.match_score}%</span>` : ''}
        </div>
        <div class="property-card-body">
          <h3>${p.title}</h3>
          <div class="location" style="font-size:0.85rem; color:var(--text-light);">📍 ${p.city}${p.neighborhood ? ' · ' + p.neighborhood : ''}</div>
          <div class="property-card-meta">
            ${p.rooms ? `<span>🛏 ${p.rooms} חד׳</span>` : ''}
            ${p.size_sqm ? `<span>📐 ${p.size_sqm} מ"ר</span>` : ''}
            ${p.floor !== null && p.floor !== undefined ? `<span>🏢 קומה ${p.floor}</span>` : ''}
          </div>
          <div style="display:flex; gap:4px; flex-wrap:wrap;">
            ${features.map(f => `<span class="badge badge-green">${f}</span>`).join('')}
          </div>
          <div class="property-card-footer">
            <span class="price">₪${p.rent_price.toLocaleString()}</span>
            <span class="btn btn-primary btn-sm">פרטים</span>
          </div>
        </div>
      </div>`;
  }).join('');

  // Pagination
  const pag = document.getElementById('pagination');
  if (data.pages > 1) {
    let html = '';
    for (let i = 1; i <= data.pages; i++) {
      html += `<button class="${i === data.page ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
    }
    pag.innerHTML = html;
  } else {
    pag.innerHTML = '';
  }
}

function goPage(p) {
  currentPage = p;
  searchProperties();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function resetFilters() {
  document.getElementById('filter-city').value = '';
  document.getElementById('filter-min-price').value = '';
  document.getElementById('filter-max-price').value = '';
  document.querySelectorAll('.chip-group .chip').forEach(c => c.classList.remove('active'));
  document.querySelectorAll('.chip-group .chip[data-val="all"]').forEach(c => c.classList.add('active'));
  document.getElementById('f-furnished').checked = false;
  document.getElementById('f-parking').checked = false;
  document.getElementById('f-elevator').checked = false;
  document.getElementById('f-pets').checked = false;
  currentPage = 1;
  searchProperties();
}

// Initial load
searchProperties();
</script>
{% endblock %}
