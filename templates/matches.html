{% extends "base.html" %}
{% block title %}התאמות{% endblock %}

{% block content %}
<div class="matches-page">
  <!-- Top bar -->
  <div class="matches-topbar">
    <h2>ההתאמות שלי 🔥</h2>
    <div style="display:flex; align-items:center; gap:16px;">
      <span id="match-counter" style="font-size:0.9rem; color:var(--text-light);">0 דירות</span>
      <div class="matches-filter">
        <span>מינימום:</span>
        <input type="range" id="min-score" min="0" max="90" value="0" step="5">
        <span id="min-score-val">0%</span>
      </div>
    </div>
  </div>

  <!-- Swipe area -->
  <div class="swipe-area">
    <div class="card-stack" id="card-stack">
      <!-- Cards injected by JS -->
    </div>

    <!-- Empty state -->
    <div class="empty-state" id="empty-state" style="display:none;">
      <div class="empty-state-icon">🏠</div>
      <h3>ראית את הכל!</h3>
      <p>נסה להוריד את ציון המינימום שלך</p>
      <button class="btn btn-primary" onclick="reloadCards()">טען מחדש</button>
    </div>
  </div>

  <!-- Action buttons -->
  <div class="swipe-actions">
    <button class="action-btn undo" onclick="undoSwipe()" title="Ctrl+Z">↩</button>
    <button class="action-btn nope" onclick="swipeLeft()" title="←">✕</button>
    <button class="action-btn info" onclick="showDetail()" title="↑">ℹ</button>
    <button class="action-btn like" onclick="swipeRight()" title="→">♥</button>
  </div>
</div>

<!-- Detail slide-up panel -->
<div class="detail-panel-overlay" id="detail-overlay" onclick="closeDetail()"></div>
<div class="detail-panel" id="detail-panel">
  <div class="detail-panel-handle"></div>
  <div id="detail-content"></div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/swipe.js') }}"></script>
{% endblock %}
