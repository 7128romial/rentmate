{% extends "base.html" %}
{% block title %}עריכת מודעה{% endblock %}

{% block content %}
<div class="wizard-container">
  <div class="page-header">
    <a href="{{ url_for('properties.property_detail', property_id=prop.id) }}" style="color:var(--text-light);">← חזרה למודעה</a>
    <h1 class="mt-1">עריכת מודעה</h1>
  </div>

  <div class="wizard-panel">
    <form method="POST" action="{{ url_for('properties.edit_listing', property_id=prop.id) }}">
      <div class="form-group">
        <label>כותרת</label>
        <input type="text" name="title" class="form-control" value="{{ prop.title }}" required>
      </div>
      <div class="form-group">
        <label>תיאור</label>
        <textarea name="description" class="form-control">{{ prop.description or '' }}</textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>עיר</label>
          <select name="city" class="form-control" required>
            {% for c in cities %}
            <option value="{{ c }}" {{ 'selected' if prop.city == c else '' }}>{{ c }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label>שכונה</label>
          <input type="text" name="neighborhood" class="form-control" value="{{ prop.neighborhood or '' }}">
        </div>
      </div>
      <div class="form-group">
        <label>כתובת</label>
        <input type="text" name="address" class="form-control" value="{{ prop.address or '' }}">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>סוג נכס</label>
          <select name="property_type" class="form-control">
            <option value="apartment" {{ 'selected' if prop.property_type == 'apartment' else '' }}>דירה</option>
            <option value="room" {{ 'selected' if prop.property_type == 'room' else '' }}>חדר</option>
            <option value="studio" {{ 'selected' if prop.property_type == 'studio' else '' }}>סטודיו</option>
            <option value="house" {{ 'selected' if prop.property_type == 'house' else '' }}>בית</option>
          </select>
        </div>
        <div class="form-group">
          <label>חדרים</label>
          <input type="number" name="rooms" class="form-control" step="0.5" value="{{ prop.rooms }}">
        </div>
        <div class="form-group">
          <label>קומה</label>
          <input type="number" name="floor" class="form-control" value="{{ prop.floor }}">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>שטח (מ"ר)</label>
          <input type="number" name="size_sqm" class="form-control" value="{{ prop.size_sqm }}">
        </div>
        <div class="form-group">
          <label>שכירות (₪)</label>
          <input type="number" name="rent_price" class="form-control" value="{{ prop.rent_price }}" required>
        </div>
        <div class="form-group">
          <label>תקופה מינ׳</label>
          <select name="min_rental_months" class="form-control">
            <option value="1" {{ 'selected' if prop.min_rental_months == 1 else '' }}>חודש</option>
            <option value="3" {{ 'selected' if prop.min_rental_months == 3 else '' }}>3 חודשים</option>
            <option value="6" {{ 'selected' if prop.min_rental_months == 6 else '' }}>6 חודשים</option>
            <option value="12" {{ 'selected' if prop.min_rental_months == 12 else '' }}>שנה</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>זמין מתאריך</label>
        <input type="date" name="available_from" class="form-control" value="{{ prop.available_from.isoformat() if prop.available_from else '' }}">
      </div>

      <label style="font-weight:600; margin-bottom:12px; display:block;">תכונות</label>
      <div style="display:flex; flex-wrap:wrap; gap:16px; margin-bottom:20px;">
        <label style="display:flex; gap:6px; align-items:center;"><input type="checkbox" name="furnished" {{ 'checked' if prop.furnished else '' }}> מרוהטת</label>
        <label style="display:flex; gap:6px; align-items:center;"><input type="checkbox" name="parking" {{ 'checked' if prop.parking else '' }}> חנייה</label>
        <label style="display:flex; gap:6px; align-items:center;"><input type="checkbox" name="elevator" {{ 'checked' if prop.elevator else '' }}> מעלית</label>
        <label style="display:flex; gap:6px; align-items:center;"><input type="checkbox" name="balcony" {{ 'checked' if prop.balcony else '' }}> מרפסת</label>
        <label style="display:flex; gap:6px; align-items:center;"><input type="checkbox" name="ac" {{ 'checked' if prop.ac else '' }}> מיזוג</label>
        <label style="display:flex; gap:6px; align-items:center;"><input type="checkbox" name="storage" {{ 'checked' if prop.storage else '' }}> מחסן</label>
        <label style="display:flex; gap:6px; align-items:center;"><input type="checkbox" name="pets_allowed" {{ 'checked' if prop.pets_allowed else '' }}> חיות מחמד</label>
        <label style="display:flex; gap:6px; align-items:center;"><input type="checkbox" name="smoking_allowed" {{ 'checked' if prop.smoking_allowed else '' }}> עישון</label>
      </div>

      <div style="display:flex; gap:12px;">
        <button type="submit" class="btn btn-primary">שמור שינויים</button>
        <a href="{{ url_for('properties.property_detail', property_id=prop.id) }}" class="btn btn-ghost">ביטול</a>
      </div>
    </form>

    <hr style="margin:32px 0;">
    <h3>תמונות</h3>
    <div id="listing-images" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;">
      {% for img in prop.images %}
      <div class="listing-image-thumb" data-id="{{ img.id }}" style="position:relative;aspect-ratio:1;border-radius:8px;overflow:hidden;">
        <img src="{{ img.thumb_url or img.image_url }}" style="width:100%;height:100%;object-fit:cover;" alt="">
        <button type="button" class="btn btn-ghost btn-sm"
                style="position:absolute;top:4px;left:4px;background:rgba(255,255,255,0.9);"
                onclick="rmDeleteImage({{ img.id }}, this)">🗑</button>
        {% if img.is_primary %}<span style="position:absolute;bottom:4px;right:4px;background:#FF4458;color:#fff;padding:2px 8px;border-radius:6px;font-size:0.7rem;">ראשי</span>{% endif %}
      </div>
      {% endfor %}
    </div>
    <div style="margin-top:12px;">
      <input type="file" id="image-upload" accept="image/*" multiple style="display:none;" onchange="rmUploadImages(this)">
      <button class="btn btn-outline" onclick="document.getElementById('image-upload').click()">העלה תמונות (עד 10)</button>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const PROP_ID = {{ prop.id }};

async function rmUploadImages(input) {
  if (!input.files || !input.files.length) return;
  const fd = new FormData();
  for (const f of input.files) fd.append('images', f);
  const res = await fetch(`/api/properties/${PROP_ID}/images`, { method: 'POST', body: fd });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    showToast(err.error || 'שגיאה בהעלאה', 'error');
    return;
  }
  const data = await res.json();
  const grid = document.getElementById('listing-images');
  for (const img of data.images) {
    const div = document.createElement('div');
    div.className = 'listing-image-thumb';
    div.dataset.id = img.id;
    div.style.cssText = 'position:relative;aspect-ratio:1;border-radius:8px;overflow:hidden;';
    div.innerHTML = `
      <img src="${img.thumb}" style="width:100%;height:100%;object-fit:cover;" alt="">
      <button type="button" class="btn btn-ghost btn-sm"
              style="position:absolute;top:4px;left:4px;background:rgba(255,255,255,0.9);"
              onclick="rmDeleteImage(${img.id}, this)">🗑</button>
      ${img.is_primary ? '<span style="position:absolute;bottom:4px;right:4px;background:#FF4458;color:#fff;padding:2px 8px;border-radius:6px;font-size:0.7rem;">ראשי</span>' : ''}
    `;
    grid.appendChild(div);
  }
  input.value = '';
  showToast('התמונות הועלו');
}

async function rmDeleteImage(id, btn) {
  const res = await fetch(`/api/images/${id}`, { method: 'DELETE' });
  if (!res.ok) { showToast('שגיאה במחיקה', 'error'); return; }
  btn.closest('.listing-image-thumb').remove();
  showToast('נמחק');
}
</script>
{% endblock %}
