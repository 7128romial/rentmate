{% extends "base.html" %}
{% block title %}עריכת פרופיל — RentMate{% endblock %}

{% block content %}
<div class="container" style="max-width:560px;margin:var(--sp-5) auto;">
  <h2>עריכת פרופיל</h2>
  <form method="POST" action="{{ url_for('profile.edit') }}" class="card card-lg" style="margin-top:var(--sp-4);">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="form-row">
      <div class="form-group">
        <label>שם פרטי</label>
        <input name="first_name" class="form-control" value="{{ user.first_name }}" required>
      </div>
      <div class="form-group">
        <label>שם משפחה</label>
        <input name="last_name" class="form-control" value="{{ user.last_name }}" required>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>תאריך לידה</label>
        <input name="birth_date" type="date" class="form-control" value="{{ user.birth_date.isoformat() if user.birth_date }}">
      </div>
      <div class="form-group">
        <label>מגדר</label>
        <select name="gender" class="form-control">
          <option value="undisclosed" {{ 'selected' if user.gender.value == 'undisclosed' }}>לא מעוניין/ת לציין</option>
          <option value="male" {{ 'selected' if user.gender.value == 'male' }}>זכר</option>
          <option value="female" {{ 'selected' if user.gender.value == 'female' }}>נקבה</option>
          <option value="other" {{ 'selected' if user.gender.value == 'other' }}>אחר</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>ביו</label>
      <textarea name="bio" class="form-control" rows="3" maxlength="500">{{ user.bio or '' }}</textarea>
    </div>
    <div style="display:flex;gap:8px;">
      <button type="submit" class="btn btn-primary">שמור</button>
      <a href="{{ url_for('profile.view') }}" class="btn btn-ghost">ביטול</a>
    </div>
  </form>

  <div class="card card-lg" style="margin-top:var(--sp-4);">
    <h3>התפקידים שלי</h3>
    <p class="small">באיזה אופנים אתם משתמשים ב-RentMate? תוכלו להפעיל / לכבות בכל עת.</p>
    <div class="chip-group" id="role-chips">
      <button class="chip {{ 'active' if user.has_role('tenant') }}" data-role="tenant">שוכר/ת</button>
      <button class="chip {{ 'active' if user.has_role('roommate') }}" data-role="roommate">שותף/ה</button>
      <button class="chip {{ 'active' if user.has_role('landlord') }}" data-role="landlord">משכיר/ה</button>
    </div>
    <button class="btn btn-primary btn-sm" style="margin-top:8px;" onclick="saveRoles()">עדכן תפקידים</button>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.querySelectorAll('#role-chips .chip').forEach(c => {
  c.addEventListener('click', () => c.classList.toggle('active'));
});
async function saveRoles() {
  const roles = [...document.querySelectorAll('#role-chips .chip.active')].map(c => c.dataset.role);
  if (!roles.length) return RM.toast('בחרו לפחות תפקיד אחד', 'error');
  try {
    await RM.apiFetch('/profile/api/roles', { method: 'POST', body: { roles } });
    RM.toast('התפקידים עודכנו');
  } catch (e) { RM.toast(e.message, 'error'); }
}
</script>
{% endblock %}
