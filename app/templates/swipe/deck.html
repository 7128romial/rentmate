{% extends "base.html" %}
{% block title %}גלה התאמות — RentMate{% endblock %}
{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/swipe.css') }}">
{% endblock %}

{% block content %}
<div class="swipe-page">
  <div class="swipe-topbar">
    <h2>התאמות עבורך 🔥</h2>
    <div style="display:flex;gap:var(--sp-3);align-items:center;">
      <span id="swipe-counter" class="small">0 התאמות</span>
      <div class="swipe-filter">
        <label for="min-score" class="small">מינ׳</label>
        <input id="min-score" type="range" min="0" max="90" value="0" step="5" aria-label="מינימום ציון">
        <span id="min-score-val" class="small">0%</span>
      </div>
    </div>
  </div>

  <div class="deck" id="deck"></div>

  <div class="swipe-actions">
    <button class="action-btn undo" aria-label="בטל" title="Ctrl+Z" onclick="RM.SWIPE.undo()">↶</button>
    <button class="action-btn nope" aria-label="דחה" title="←" onclick="RM.SWIPE.swipeLeft()">✕</button>
    <button class="action-btn like" aria-label="אהבתי" title="→" onclick="RM.SWIPE.swipeRight()">❤</button>
    <button class="action-btn save" aria-label="שמור" title="שמור ב-super" onclick="RM.SWIPE.demoMatch()">⭐</button>
  </div>
</div>

<div class="detail-overlay" id="detail-overlay" onclick="RM.SWIPE.closeDetail()"></div>
<div class="detail-drawer" id="detail-drawer" role="dialog" aria-label="פרטי דירה">
  <div class="detail-drawer-handle"></div>
  <div id="detail-content"></div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/card-stack.js') }}"></script>
<script src="{{ url_for('static', filename='js/swipe.js') }}"></script>
{% endblock %}
