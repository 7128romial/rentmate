{% extends "base.html" %}
{% block title %}אימות קוד — RentMate{% endblock %}
{% block content %}
<div class="container" style="max-width:420px;margin:var(--sp-7) auto;">
  <div class="card card-lg">
    <h2 style="text-align:center;">אמתו את הקוד</h2>
    <p class="small" style="text-align:center;">שלחנו קוד בן 6 ספרות ל-<strong>{{ phone or 'הטלפון שלכם' }}</strong></p>
    <form method="POST" action="{{ url_for('auth.verify') }}" style="margin-top:var(--sp-4);">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label for="code" class="sr-only">קוד אימות</label>
        <input id="code" name="code" class="form-control" type="text" inputmode="numeric"
               maxlength="6" pattern="\d{6}" placeholder="000000" dir="ltr"
               style="text-align:center;font-size:1.8rem;letter-spacing:0.4em;" required autofocus>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg">אשרו</button>
    </form>
    <form method="POST" action="{{ url_for('auth.resend_code') }}" style="text-align:center;margin-top:var(--sp-4);">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <button type="submit" class="linky">לא קיבלתי קוד — שלחו שוב</button>
    </form>
    <p class="small" style="text-align:center;margin-top:var(--sp-3);">
      <a href="{{ url_for('auth.login') }}">שגוי? חזרו להזנת מספר</a>
    </p>
  </div>
</div>
{% endblock %}
