{% extends "base.html" %}
{% block title %}התחברות — RentMate{% endblock %}
{% block content %}
<div class="container" style="max-width:420px;margin:var(--sp-7) auto;">
  <div class="card card-lg">
    <h2 style="text-align:center;">ברוכים הבאים 👋</h2>
    <p class="small" style="text-align:center;">שלחו קוד אימות לטלפון שלכם כדי להתחבר או להירשם</p>
    <form method="POST" action="{{ url_for('auth.login') }}" style="margin-top:var(--sp-4);">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label for="phone">מספר טלפון נייד</label>
        <input id="phone" name="phone" class="form-control" type="tel" inputmode="tel"
               placeholder="050-1234567" dir="ltr" value="{{ phone or '' }}" required>
        <div class="form-hint">נשלח קוד אימות דרך SMS (ללא עלות)</div>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg">שלחו לי קוד</button>
    </form>
    <p class="small" style="text-align:center;margin-top:var(--sp-4);">בחיבור אתם מסכימים <a href="#">לתנאי השימוש</a></p>
  </div>
</div>
{% endblock %}
