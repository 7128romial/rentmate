{% extends "base.html" %}
{% block title %}בחרו את התפקיד שלכם — RentMate{% endblock %}
{% block content %}
<div class="container" style="max-width:720px;margin:var(--sp-7) auto;">
  <div class="card card-lg">
    <h2 style="text-align:center;">מה מביא אתכם ל-RentMate?</h2>
    <p class="small" style="text-align:center;">בחרו תפקיד אחד או יותר. תוכלו לשנות בכל עת.</p>
    <form method="POST" action="{{ url_for('auth.choose_roles') }}" style="margin-top:var(--sp-5);">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="role-tiles">
        <label class="role-tile{% if 'tenant' in selected %} selected{% endif %}">
          <input type="checkbox" name="roles" value="tenant" {{ 'checked' if 'tenant' in selected }}>
          <span class="emoji">🏠</span>
          <h4>שוכר/ת דירה</h4>
          <p>מחפש/ת דירה שלמה לשכירות</p>
        </label>
        <label class="role-tile{% if 'roommate' in selected %} selected{% endif %}">
          <input type="checkbox" name="roles" value="roommate" {{ 'checked' if 'roommate' in selected }}>
          <span class="emoji">🛏</span>
          <h4>שותף/ה לדירה</h4>
          <p>מחפש/ת חדר או מציע/ה חדר</p>
        </label>
        <label class="role-tile{% if 'landlord' in selected %} selected{% endif %}">
          <input type="checkbox" name="roles" value="landlord" {{ 'checked' if 'landlord' in selected }}>
          <span class="emoji">🔑</span>
          <h4>משכיר/ה</h4>
          <p>מפרסם/ת דירה להשכרה</p>
        </label>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top:var(--sp-4);">המשך</button>
    </form>
  </div>
</div>
<script>
document.querySelectorAll('.role-tile').forEach(tile => {
  const cb = tile.querySelector('input[type="checkbox"]');
  tile.addEventListener('click', (e) => {
    if (e.target !== cb) cb.checked = !cb.checked;
    tile.classList.toggle('selected', cb.checked);
  });
});
</script>
{% endblock %}
