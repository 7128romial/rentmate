<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>RentMate - יש התאמה!</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Heebo:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
  </head>
  <body class="match-body">
    <div id="app" class="match-app">
      <div class="match-content">
        <h1 class="match-title">יש מאץ'!</h1>
        <p class="match-subtitle" id="match-subtitle">מעולה! גם בעל הדירה אהב את הפרופיל שלך.</p>

        <div class="match-avatars">
          <div class="avatar user"></div>
          <div class="avatar property" id="match-avatar"></div>
        </div>

        <div id="match-map-host" class="match-map-host"></div>

        <div class="match-actions">
          <button class="btn-primary" id="match-chat-btn">התחל צ'אט עכשיו</button>
          <button class="btn-secondary" onclick="window.location.href='/swipe.html'">נמשיך לחפש בינתיים</button>
        </div>
      </div>
    </div>
    <script type="module" src="/match.js"></script>
  </body>
</html>
