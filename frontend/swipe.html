<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>RentMate - גלה התאמות</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Heebo:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
  </head>
  <body>
    <div id="app">
      <header class="chat-header">
        <div class="header-info">
          <h2 style="color: var(--primary)">RentMate</h2>
          <p id="swipe-subtitle">גלה התאמות חדשות</p>
        </div>
        <button id="filter-btn" class="header-icon-btn" type="button" aria-label="סינון">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg>
          <span class="dot" id="filter-active-dot" hidden></span>
        </button>
      </header>

      <div id="filter-sheet" class="filter-sheet" hidden>
        <div class="filter-sheet-card">
          <div class="filter-sheet-head">
            <h3>סינון</h3>
            <button type="button" class="filter-close" aria-label="סגור">×</button>
          </div>
          <div class="filter-field">
            <label for="filter-area">אזור / כתובת</label>
            <input id="filter-area" class="profile-input" type="text" placeholder="למשל: תל אביב, פלורנטין">
          </div>
          <div class="filter-field">
            <label>טווח מחירים (₪/חודש)</label>
            <div class="filter-row-inline">
              <input id="filter-min-price" class="profile-input" type="number" min="0" step="100" inputmode="numeric" placeholder="מ-">
              <span class="filter-dash">—</span>
              <input id="filter-max-price" class="profile-input" type="number" min="0" step="100" inputmode="numeric" placeholder="עד">
            </div>
          </div>
          <div class="filter-field">
            <label for="filter-rooms">מינימום חדרים</label>
            <select id="filter-rooms" class="profile-input">
              <option value="0">לא משנה</option>
              <option value="1">חדר ומעלה</option>
              <option value="2">2 ומעלה</option>
              <option value="3">3 ומעלה</option>
            </select>
          </div>
          <div class="filter-field filter-toggle-row">
            <span>הצג גם חדרים בדירות שותפים</span>
            <label class="toggle">
              <input id="filter-include-shared" type="checkbox" checked>
              <span class="toggle-track"></span>
            </label>
          </div>
          <div class="filter-actions">
            <button type="button" class="btn-ghost" id="filter-reset">איפוס</button>
            <button type="button" class="btn-primary" id="filter-apply">הצג דירות</button>
          </div>
        </div>
      </div>
      
      <div id="swipe-container">
        <!-- Cards will be injected here -->
      </div>

      <div class="action-buttons">
        <button id="btn-nope" class="action-btn nope">
          <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
        <button id="btn-super" class="action-btn super">
          <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
        </button>
        <button id="btn-like" class="action-btn like">
          <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
        </button>
      </div>

      <nav id="bottom-nav"></nav>
    </div>
    
    <!-- Hammer.js for swipe gestures -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <script type="module" src="/swipe.js"></script>
  </body>
</html>
