<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>RentMate - התחברות</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Heebo:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
  </head>
  <body class="login-body">
    <div id="app" class="login-app">
      <div class="login-content">
        <h1 class="brand-title">RentMate</h1>
        <p class="brand-subtitle">מצא את הבית הבא שלך ב-7 ימים,<br>לא ב-7 חודשים.</p>

        <form class="auth-form" id="login-form">
          <input type="email" id="email-input" class="auth-input" placeholder="הזן כתובת אימייל" required autocomplete="email">
          <input type="password" id="password-input" class="auth-input" placeholder="הזן סיסמה" required autocomplete="current-password" style="margin-top: 10px;">
          <button type="submit" class="btn-primary" style="margin-top: 20px;">התחבר / הירשם</button>
        </form>
      </div>
    </div>
    
    <div id="recaptcha-container"></div>
    <script type="module" src="/login.js"></script>
  </body>
</html>
