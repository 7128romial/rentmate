<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>RentMate - התחברות</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Heebo:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
  </head>
  <body class="login-body">
    <div id="app" class="login-app">
      <div class="login-content">
        <h1 class="brand-title">RentMate</h1>
        <p class="brand-subtitle">מצא את הבית הבא שלך ב-7 ימים,<br>לא ב-7 חודשים.</p>

        <div class="auth-card">
          <div class="auth-tabs">
            <button type="button" id="tab-login" class="auth-tab active">התחברות</button>
            <button type="button" id="tab-register" class="auth-tab">הרשמה</button>
          </div>

          <!-- Login Form -->
          <form class="auth-form" id="login-form">
            <input type="email" id="login-email" class="auth-input" placeholder="הזן כתובת אימייל" required autocomplete="email">
            <input type="password" id="login-password" class="auth-input" placeholder="הזן סיסמה" required autocomplete="current-password" style="margin-top: 10px;">
            <button type="submit" class="btn-primary" style="margin-top: 20px;">התחבר</button>
          </form>

          <!-- Register Form -->
          <form class="auth-form hidden" id="register-form">
            <input type="text" id="register-name" class="auth-input" placeholder="שם מלא (אופציונלי)" autocomplete="name">
            <input type="email" id="register-email" class="auth-input" placeholder="הזן כתובת אימייל" required autocomplete="email" style="margin-top: 10px;">
            <input type="password" id="register-password" class="auth-input" placeholder="בחר סיסמה (לפחות 6 תווים)" required autocomplete="new-password" style="margin-top: 10px;">
            <button type="submit" class="btn-primary" style="margin-top: 20px;">צור חשבון חדש</button>
          </form>
        </div>
      </div>
    </div>
    
    <div id="recaptcha-container"></div>
    <script type="module" src="/login.js"></script>
  </body>
</html>
