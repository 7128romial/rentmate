<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>RentMate - הוסף דירה</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Heebo:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
  </head>
  <body>
    <div id="app">
      <header class="screen-header with-back">
        <a class="back-btn" href="/landlord.html" style="transform: scaleX(-1);">←</a>
        <div>
          <h1 id="form-title">הוסף דירה חדשה</h1>
          <p>פרטים שיופיעו לשוכרים בעת ההתאמה.</p>
        </div>
      </header>

      <div class="screen-body">
        <form class="profile-form" id="property-form">
          <div class="profile-field">
            <label for="p-title">כותרת *</label>
            <input class="profile-input" id="p-title" type="text" required maxlength="80" placeholder="למשל: סטודיו מואר ברוטשילד">
          </div>
          <div class="profile-field">
            <label for="p-price">מחיר חודשי (₪) *</label>
            <input class="profile-input" id="p-price" type="number" min="500" step="100" required inputmode="numeric" placeholder="4500">
          </div>
          <div class="profile-field">
            <label for="p-address">כתובת *</label>
            <input class="profile-input" id="p-address" type="text" required placeholder="למשל: רוטשילד 12, תל אביב">
          </div>
          <div class="profile-field-row">
            <div class="profile-field">
              <label for="p-rooms">חדרים</label>
              <input class="profile-input" id="p-rooms" type="number" min="1" step="0.5" inputmode="decimal" placeholder="2">
            </div>
            <div class="profile-field">
              <label for="p-area">גודל (מ״ר)</label>
              <input class="profile-input" id="p-area" type="number" min="10" step="1" inputmode="numeric" placeholder="55">
            </div>
          </div>
          <div class="profile-field-row">
            <div class="profile-field">
              <label for="p-floor">קומה</label>
              <input class="profile-input" id="p-floor" type="number" min="0" step="1" inputmode="numeric" placeholder="3">
            </div>
            <div class="profile-field">
              <label for="p-total-floors">מתוך</label>
              <input class="profile-input" id="p-total-floors" type="number" min="1" step="1" inputmode="numeric" placeholder="5">
            </div>
          </div>
          <div class="profile-field">
            <label for="p-available">תאריך פינוי</label>
            <input class="profile-input" id="p-available" type="text" placeholder="למשל: 1 ביולי, מיידית">
          </div>
          <div class="profile-field">
            <label for="p-image">קישור לתמונה (URL)</label>
            <input class="profile-input" id="p-image" type="url" placeholder="https://...">
          </div>
          <div class="profile-field">
            <label for="p-tags">תגיות (מופרדות בפסיק)</label>
            <input class="profile-input" id="p-tags" type="text" placeholder="למשל: שקט, משופצת, מרפסת">
          </div>
          <div class="profile-field">
            <label for="p-description">תיאור הדירה</label>
            <textarea class="profile-textarea" id="p-description" maxlength="600" placeholder="ספרי על הדירה — מאפיינים, סביבה, אווירת השכונה..."></textarea>
          </div>
          <div class="profile-field">
            <label for="p-amenities">מאפיינים (שורה לכל פריט)</label>
            <textarea class="profile-textarea" id="p-amenities" placeholder="מזגן&#10;מרפסת&#10;חניה משותפת"></textarea>
          </div>

          <div class="profile-actions">
            <button class="btn-primary" type="submit">פרסם דירה</button>
            <a class="btn-ghost" href="/landlord.html">ביטול</a>
          </div>
        </form>
      </div>

      <nav id="bottom-nav"></nav>
    </div>
    <script type="module" src="/landlord_add.js"></script>
  </body>
</html>
