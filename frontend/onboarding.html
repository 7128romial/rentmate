<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>RentMate - הרשמה</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Heebo:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
  </head>
  <body>
    <div id="app">
      <div id="chat-container">
        <header class="chat-header">
          <div class="header-avatar">AI</div>
          <div class="header-info">
            <h2>RentMate Assistant</h2>
            <p>מחובר/ת</p>
          </div>
        </header>
        
        <div class="messages-area" id="messages">
          <!-- Messages will be injected here -->
        </div>

        <form class="chat-input-area" id="chat-form">
          <input type="text" id="chat-input" placeholder="הקלד/י כאן..." autocomplete="off">
          <button type="submit" id="send-button">
            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="send-icon" style="transform: scaleX(-1);"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
          </button>
        </form>
      </div>
    </div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
