<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>RentMate - צ'אט</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Heebo:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
  </head>
  <body>
    <div id="app">
      <header class="chat-header">
        <a class="back-btn" href="/matches.html" style="transform: scaleX(-1);">←</a>
        <div class="header-avatar" id="chat-avatar"></div>
        <div class="header-info">
          <h2 id="chat-title">דירה</h2>
          <p id="chat-subtitle">הותאם היום</p>
        </div>
        <button id="btn-generate-lease" class="btn-primary" style="margin-right: auto; font-size: 14px; padding: 6px 12px; display: none;">📄 צור חוזה</button>
      </header>

      <!-- Lease Modal -->
      <div id="lease-modal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; padding: 20px;">
        <div style="background: white; border-radius: 12px; width: 100%; max-width: 600px; max-height: 90vh; display: flex; flex-direction: column;">
          <div style="padding: 16px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center;">
            <h3 style="margin: 0;">חוזה שכירות</h3>
            <button id="close-lease-modal" style="background: none; border: none; font-size: 24px; cursor: pointer;">&times;</button>
          </div>
          <div id="lease-content" style="padding: 20px; overflow-y: auto; flex: 1; direction: rtl; text-align: right; background: #fafafa; font-family: serif; border-bottom: 1px solid #ddd;">
            טוען...
          </div>
          <div style="padding: 16px; display: flex; justify-content: flex-end;">
            <button id="print-lease" class="btn-primary">הדפס / שמור כ-PDF</button>
          </div>
        </div>
      </div>

      <div id="chat-map-host" class="chat-map-host"></div>

      <div class="messages-area" id="realtime-messages">
        <div class="message ai"><div class="message-content">היי! ראיתי שעשינו מאץ'. עדיין רלוונטי?</div></div>
      </div>

      <form class="chat-input-area">
        <input type="text" id="chat-input" placeholder="הקלד/י הודעה..." autocomplete="off">
        <button type="submit" id="send-button">
          <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="send-icon" style="transform: scaleX(-1);"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>
      </form>
    </div>
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script type="module" src="/realtime_chat.js"></script>
  </body>
</html>
