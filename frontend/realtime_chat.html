<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>RentMate - צ'אט</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Heebo:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
  </head>
  <body>
    <div id="app">
      <header class="chat-header">
        <button class="back-btn" onclick="window.location.href='/match.html'" style="transform: scaleX(-1);">←</button>
        <div class="header-avatar" style="background-image: url('https://images.unsplash.com/photo-1522708323590-d24dbb6b0267?auto=format&fit=crop&w=600&q=80'); background-size: cover; margin-right: 0; margin-left: 16px;"></div>
        <div class="header-info">
          <h2>סטודיו מואר בפלורנטין</h2>
          <p>הותאם היום</p>
        </div>
      </header>
      
      <div class="messages-area" id="realtime-messages">
        <div class="message ai"><div class="message-content">היי! ראיתי שעשינו מאץ'. עדיין רלוונטי?</div></div>
      </div>

      <form class="chat-input-area" onsubmit="event.preventDefault(); const input=this.querySelector('input'); if(input.value) { const div=document.createElement('div'); div.className='message user'; div.innerHTML=`<div class='message-content'>${input.value}</div>`; document.getElementById('realtime-messages').appendChild(div); input.value=''; document.querySelector('.messages-area').scrollTop=10000; }">
        <input type="text" id="chat-input" placeholder="הקלד/י הודעה..." autocomplete="off">
        <button type="submit" id="send-button">
          <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="send-icon" style="transform: scaleX(-1);"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>
      </form>
    </div>
  </body>
</html>
